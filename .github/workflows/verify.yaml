on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      run_tests:
        required: false
        type: boolean
        default: true
      connector:
        description: 'Connector name for regression testing (e.g., baton-okta). If set, runs baton-regression verification.'
        required: false
        type: string
        default: ''
    secrets:
      RELENG_GITHUB_TOKEN:
        required: false
jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/conductorone/*
    steps:
    - name: Checkout caller repo
      uses: actions/checkout@v5
      with:
        path: _caller
        repository: ${{ github.event.repository.full_name }}
        fetch-depth: 0
        ref: ${{ inputs.ref }}
    - name: Configure git for private modules
      env:
        TOKEN: ${{ secrets.RELENG_GITHUB_TOKEN }}
      run: |
        if [ -n "$TOKEN" ]; then
          git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"
        fi
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version-file: _caller/go.mod
    - name: Run linters
      uses: golangci/golangci-lint-action@v9
      with:
       version: v2.11.4
       args: --timeout=6m
       working-directory: _caller
  test:
    if: inputs.run_tests == true
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    env:
      GOPRIVATE: github.com/conductorone/*
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.repository.full_name }}
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - name: Configure git for private modules
        env:
          TOKEN: ${{ secrets.RELENG_GITHUB_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go tests
        run: go test -v -covermode=count -json ./... | tee test.json
      - name: annotate go tests
        if: always()
        uses: guyarb/golang-test-annotations@v0.8.0
        with:
          test-results: test.json
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _workflow
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: _workflow/tools/mdx-lint/package-lock.json

      - name: Install MDX lint dependencies
        run: |
          npm ci --ignore-scripts --silent --prefix _workflow/tools/mdx-lint 2>&1 | tail -n 1

      - name: Checkout caller repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.event.repository.full_name }}
          ref: ${{ inputs.ref }}
          path: _caller
          persist-credentials: false

      - name: Check for docs/connector.mdx
        id: check-docs
        run: |
          if [ -f "_caller/docs/connector.mdx" ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
            echo "No docs/connector.mdx found, skipping MDX validation"
          fi

      - name: Validate MDX documentation
        if: steps.check-docs.outputs.has_docs == 'true'
        shell: bash
        run: |
          node _workflow/tools/mdx-lint/mdx-lint.mjs < _caller/docs/connector.mdx
          LINT_RC=$?

          if [ "$LINT_RC" -eq 0 ]; then
            echo "MDX validation passed"
          else
            echo "::error file=docs/connector.mdx::MDX validation failed. See log output above for details."
            exit 1
          fi

  regression:
    if: inputs.connector != ''
    uses: ./.github/workflows/regression.yaml
    with:
      connector: ${{ inputs.connector }}
    secrets:
      RELENG_GITHUB_TOKEN: ${{ secrets.RELENG_GITHUB_TOKEN }}
